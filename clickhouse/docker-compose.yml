services:
  clickhouse:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_IMAGE_VERSION:-latest}
    ports:
      - "${CLICKHOUSE_PORT:-8123}:8123" # HTTP interface
      - "${CLICKHOUSE_PORT_NATIVE_CLIENT:-9003}:9000" # Native client port
      - "${CLICKHOUSE_PORT_REPLICATION:-9009}:9009" # Inter-server replication port
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-default}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
